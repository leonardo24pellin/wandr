<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#1a1a2e"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Wandr"/>
<title>Wandr — Travel Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root {
  --ink:      #0f0f1a;
  --ink2:     #1a1a2e;
  --surface:  #f8f7f4;
  --surface2: #f0ede8;
  --surface3: #e8e4dc;
  --accent:   #e8632a;
  --teal:     #2dd4bf;
  --text:     #1a1a2e;
  --text2:    #4a4a6a;
  --text3:    #8888a8;
  --white:    #ffffff;
  --r:        14px;
  --rs:       8px;
  --shadow:   0 4px 24px rgba(15,15,26,.08);
  --shadowL:  0 12px 48px rgba(15,15,26,.18);
  --fd:       "Playfair Display", Georgia, serif;
  --fb:       "DM Sans", system-ui, sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--surface);color:var(--text);min-height:100dvh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:99px}

#app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
.screen{display:none;flex-direction:column;height:100%;overflow:hidden}
.screen.active{display:flex}

.card{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);border:1px solid rgba(15,15,26,.06)}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:99px;font-family:var(--fb);font-weight:500;font-size:14px;cursor:pointer;border:none;transition:all .2s;white-space:nowrap}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:#d55520;transform:translateY(-1px)}
.btn-s{background:var(--surface2);color:var(--text);border:1px solid var(--surface3)}.btn-s:hover{background:var(--surface3)}
.btn-g{background:transparent;color:var(--text2)}.btn-g:hover{background:var(--surface2)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}

.inp{width:100%;padding:11px 14px;border:1.5px solid var(--surface3);border-radius:var(--rs);font-family:var(--fb);font-size:14px;background:var(--white);color:var(--text);outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--accent)}
select.inp{cursor:pointer}
textarea.inp{resize:vertical;min-height:72px}

.overlay{position:fixed;inset:0;background:rgba(15,15,26,.5);backdrop-filter:blur(4px);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px;animation:fi .2s}
.modal{background:var(--white);border-radius:22px;padding:28px;width:100%;max-width:500px;max-height:90dvh;overflow-y:auto;box-shadow:var(--shadowL);animation:fu .3s}

.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:500}
.tabs{display:flex;border-top:1px solid rgba(255,255,255,.1)}
.tab-btn{flex:1;padding:11px 6px;border:none;cursor:pointer;background:transparent;color:var(--text3);font-family:var(--fb);font-size:11px;font-weight:500;border-bottom:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .2s}
.tab-btn.active{color:#fff;border-bottom-color:var(--accent)}
.tab-btn .icon{font-size:15px}
.tab-content{display:none;flex:1;overflow:hidden}
.tab-content.active{display:flex;flex-direction:column}
.scroll{flex:1;overflow-y:auto;padding:18px}

.prog{height:5px;background:var(--surface3);border-radius:99px;overflow:hidden;margin-top:6px}
.prog-fill{height:100%;border-radius:99px;transition:width .6s}
.bbar{height:3px;background:rgba(255,255,255,.1);border-radius:99px;margin-top:5px}
.bbar-fill{height:100%;border-radius:99px;transition:width .5s}

.act-card{display:flex;gap:11px;padding:11px 13px;background:var(--white);border-radius:11px;border:1px solid var(--surface3);margin-bottom:8px;animation:sl .25s}
.act-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.day-num{width:38px;height:38px;background:var(--ink2);border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0}

.stat-card{padding:16px;text-align:center}
.stat-val{font-family:var(--fd);font-size:20px;font-weight:700}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:.05em}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
@media(max-width:400px){.grid3{grid-template-columns:1fr 1fr}}

.emoji-grid{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.emoji-btn{width:40px;height:40px;border-radius:9px;border:2px solid transparent;background:var(--surface2);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.emoji-btn.sel{border-color:var(--accent)}
.type-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.type-pill{padding:5px 11px;border-radius:99px;border:1.5px solid var(--surface3);background:var(--surface2);font-size:12px;cursor:pointer;font-family:var(--fb);transition:all .15s}

.share-code{background:var(--ink2);color:#fff;padding:18px 28px;border-radius:14px;font-size:30px;font-weight:700;letter-spacing:.25em;font-family:monospace;text-align:center}
.hdr{background:var(--ink2);flex-shrink:0;padding:16px 18px}
.hdr-top{display:flex;align-items:center;gap:12px}
.hdr h1{font-family:var(--fd);color:#fff;font-size:19px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr p{color:var(--text3);font-size:11px;margin-top:1px}
.home-hdr{background:var(--ink2);padding:18px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.home-hdr h1{font-family:var(--fd);color:#fff;font-size:26px;font-weight:700}
.trip-card{padding:20px;cursor:pointer;transition:transform .2s;margin-bottom:14px}
.trip-card:hover{transform:translateY(-2px)}
.empty{text-align:center;padding:52px 20px;color:var(--text3)}
.empty .ei{font-size:52px;margin-bottom:14px}
.info-bar{padding:10px 16px;background:var(--surface2);border-bottom:1px solid var(--surface3);font-size:12px;color:var(--text2);flex-shrink:0}
#map-container{flex:1;position:relative}
#map{height:100%;width:100%}
.leaflet-container{font-family:var(--fb)!important}
.leaflet-popup-content-wrapper{border-radius:11px!important;box-shadow:var(--shadowL)!important}

@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes sl{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.fa{animation:fu .35s ease both}
</style>
</head>
<body>
<div id="app">

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home-hdr">
    <div>
      <h1>🧳 Wandr</h1>
      <p style="color:var(--text3);font-size:12px;margin-top:2px">I tuoi viaggi</p>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-s" id="btn-join-home" style="padding:10px 14px">🔗 Unisciti</button>
      <button class="btn btn-p" id="btn-new-trip" style="padding:10px 16px">✈️ Nuovo</button>
    </div>
  </div>
  <div class="scroll"><div id="trips-list"></div></div>
</div>

<!-- TRIP -->
<div id="trip" class="screen">
  <div class="hdr">
    <div class="hdr-top">
      <button class="btn btn-g" id="btn-back" style="padding:7px 10px;color:var(--text3);font-size:16px;flex-shrink:0">←</button>
      <span id="trip-emoji" style="font-size:26px;flex-shrink:0"></span>
      <div style="flex:1;min-width:0">
        <h1 id="trip-title"></h1>
        <p id="trip-subtitle"></p>
      </div>
      <button class="btn btn-g" id="btn-share" style="padding:7px 10px;color:var(--text3);flex-shrink:0" title="Condividi">🔗</button>
    </div>
    <div id="budget-hdr" style="margin-top:10px;display:none">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:2px">
        <span id="bh-label"></span><span id="bh-pct" style="font-weight:600"></span>
      </div>
      <div class="bbar"><div id="bh-fill" class="bbar-fill"></div></div>
    </div>
    <div class="tabs" style="margin-top:12px">
      <button class="tab-btn active" data-tab="itinerary"><span class="icon">📅</span>Itinerario</button>
      <button class="tab-btn" data-tab="map"><span class="icon">🗺️</span>Mappa</button>
      <button class="tab-btn" data-tab="places"><span class="icon">📍</span>Posti</button>
      <button class="tab-btn" data-tab="budget"><span class="icon">💰</span>Budget</button>
    </div>
  </div>
  <div id="tab-itinerary" class="tab-content active"><div class="scroll" id="itinerary-scroll"></div></div>
  <div id="tab-map" class="tab-content">
    <div class="info-bar" id="map-info"></div>
    <div id="map-container"><div id="map"></div></div>
  </div>
  <div id="tab-places" class="tab-content">
    <div class="scroll">
      <div style="display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap">
        <button class="btn btn-p" id="pf-all" style="padding:7px 13px;font-size:12px" onclick="filterPlaces('all')">Tutti</button>
        <button class="btn btn-s" id="pf-todo" style="padding:7px 13px;font-size:12px" onclick="filterPlaces('todo')">Da visitare</button>
        <button class="btn btn-s" id="pf-visited" style="padding:7px 13px;font-size:12px" onclick="filterPlaces('visited')">Visitati</button>
        <button class="btn btn-p" onclick="openModal('place')" style="padding:7px 14px;font-size:13px;margin-left:auto">+ Aggiungi</button>
      </div>
      <div class="grid3" id="places-stats" style="margin-bottom:14px"></div>
      <div id="places-list"></div>
    </div>
  </div>
  <div id="tab-budget" class="tab-content">
    <div class="scroll">
      <div class="grid3" id="budget-stats" style="margin-bottom:14px"></div>
      <div id="budget-bar-section" style="margin-bottom:14px;display:none"></div>
      <div id="budget-cats" style="margin-bottom:14px"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span style="font-family:var(--fd);font-size:17px">Spese</span>
        <button class="btn btn-p" onclick="openModal('expense')" style="padding:7px 14px;font-size:13px">+ Aggiungi</button>
      </div>
      <div id="expenses-list"></div>
    </div>
  </div>
</div>

</div>

<!-- MODALS -->
<div id="modal-trip" class="overlay" style="display:none" onclick="closeBg(event,'modal-trip')">
  <div class="modal">
    <h2 style="font-family:var(--fd);font-size:22px;margin-bottom:18px">Nuovo viaggio ✈️</h2>
    <div class="emoji-grid" id="trip-emojis"></div>
    <div style="display:grid;gap:10px">
      <input class="inp" id="t-title" placeholder="Titolo del viaggio *"/>
      <input class="inp" id="t-dest" placeholder="Destinazione"/>
      <div class="grid2">
        <div><label style="font-size:11px;color:var(--text2);display:block;margin-bottom:3px">Partenza</label><input class="inp" type="date" id="t-start"/></div>
        <div><label style="font-size:11px;color:var(--text2);display:block;margin-bottom:3px">Ritorno</label><input class="inp" type="date" id="t-end"/></div>
      </div>
      <div class="grid2">
        <select class="inp" id="t-currency"><option>EUR</option><option>USD</option><option>GBP</option><option>JPY</option><option>CHF</option><option>CAD</option></select>
        <input class="inp" type="number" id="t-budget" placeholder="Budget (opzionale)"/>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:18px">
      <button class="btn btn-s" onclick="closeModal('modal-trip')" style="flex:1;justify-content:center">Annulla</button>
      <button class="btn btn-p" id="btn-create-trip" style="flex:2;justify-content:center">Crea viaggio 🚀</button>
    </div>
  </div>
</div>

<div id="modal-share" class="overlay" style="display:none" onclick="closeBg(event,'modal-share')">
  <div class="modal" style="text-align:center">
    <div style="font-size:44px;margin-bottom:10px">🔗</div>
    <h2 style="font-family:var(--fd);font-size:22px;margin-bottom:6px">Condividi il viaggio</h2>
    <p style="color:var(--text2);font-size:13px;margin-bottom:18px">Chi ha questo codice può vedere e modificare il viaggio</p>
    <div class="share-code" id="share-code-display"></div>
    <button class="btn btn-p" onclick="copyCode()" style="margin-top:14px;width:100%;justify-content:center">📋 Copia codice</button>
  </div>
</div>

<div id="modal-join" class="overlay" style="display:none" onclick="closeBg(event,'modal-join')">
  <div class="modal" style="text-align:center">
    <div style="font-size:44px;margin-bottom:10px">✈️</div>
    <h2 style="font-family:var(--fd);font-size:22px;margin-bottom:6px">Unisciti a un viaggio</h2>
    <p style="color:var(--text2);font-size:13px;margin-bottom:18px">Inserisci il codice condiviso</p>
    <input class="inp" id="join-code" placeholder="Es. PARIS3" style="text-align:center;font-size:22px;font-weight:700;letter-spacing:.2em;text-transform:uppercase"/>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn btn-s" onclick="closeModal('modal-join')" style="flex:1;justify-content:center">Annulla</button>
      <button class="btn btn-p" id="btn-join-go" style="flex:1;justify-content:center">Entra</button>
    </div>
  </div>
</div>

<div id="modal-activity" class="overlay" style="display:none" onclick="closeBg(event,'modal-activity')">
  <div class="modal">
    <h3 style="font-family:var(--fd);font-size:20px;margin-bottom:14px">Aggiungi attività</h3>
    <div class="type-pills" id="act-type-pills"></div>
    <div style="display:grid;gap:10px">
      <input class="inp" id="a-title" placeholder="Titolo *"/>
      <input class="inp" id="a-address" placeholder="Luogo / indirizzo"/>
      <div class="grid3">
        <div><label style="font-size:11px;color:var(--text2);display:block;margin-bottom:3px">Orario</label><input class="inp" type="time" id="a-time" value="09:00"/></div>
        <div><label style="font-size:11px;color:var(--text2);display:block;margin-bottom:3px">Durata (min)</label><input class="inp" type="number" id="a-duration" value="60"/></div>
        <div><label style="font-size:11px;color:var(--text2);display:block;margin-bottom:3px">Costo</label><input class="inp" type="number" id="a-cost" value="0"/></div>
      </div>
      <textarea class="inp" id="a-notes" placeholder="Note..."></textarea>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn btn-s" onclick="closeModal('modal-activity')" style="flex:1;justify-content:center">Annulla</button>
      <button class="btn btn-p" id="btn-save-act" style="flex:2;justify-content:center">Aggiungi ✓</button>
    </div>
  </div>
</div>

<div id="modal-place" class="overlay" style="display:none" onclick="closeBg(event,'modal-place')">
  <div class="modal">
    <h3 style="font-family:var(--fd);font-size:20px;margin-bottom:14px">Aggiungi un posto 📍</h3>
    <div class="type-pills" id="place-cat-pills"></div>
    <div style="display:grid;gap:10px">
      <input class="inp" id="p-name" placeholder="Nome del posto *"/>
      <input class="inp" id="p-address" placeholder="Indirizzo"/>
      <textarea class="inp" id="p-notes" placeholder="Note..."></textarea>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn btn-s" onclick="closeModal('modal-place')" style="flex:1;justify-content:center">Annulla</button>
      <button class="btn btn-p" id="btn-save-place" style="flex:2;justify-content:center">Aggiungi ✓</button>
    </div>
  </div>
</div>

<div id="modal-expense" class="overlay" style="display:none" onclick="closeBg(event,'modal-expense')">
  <div class="modal">
    <h3 style="font-family:var(--fd);font-size:20px;margin-bottom:14px">Aggiungi spesa 💳</h3>
    <div class="type-pills" id="exp-cat-pills"></div>
    <div style="display:grid;gap:10px">
      <input class="inp" id="e-title" placeholder="Descrizione *"/>
      <div class="grid2">
        <div><label style="font-size:11px;color:var(--text2);display:block;margin-bottom:3px">Importo</label><input class="inp" type="number" step="0.01" id="e-amount"/></div>
        <div><label style="font-size:11px;color:var(--text2);display:block;margin-bottom:3px">Data</label><input class="inp" type="date" id="e-date"/></div>
      </div>
      <textarea class="inp" id="e-notes" placeholder="Note..."></textarea>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn btn-s" onclick="closeModal('modal-expense')" style="flex:1;justify-content:center">Annulla</button>
      <button class="btn btn-p" id="btn-save-exp" style="flex:2;justify-content:center">Aggiungi ✓</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, push, update, remove, onValue, off, get }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const db = getDatabase(initializeApp({
  apiKey:            "AIzaSyAwJuTNPqQefar7Op3OoAbBTtRikY_fS64",
  authDomain:        "wandr-4e37d.firebaseapp.com",
  databaseURL:       "https://wandr-4e37d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "wandr-4e37d",
  storageBucket:     "wandr-4e37d.firebasestorage.app",
  messagingSenderId: "122775768295",
  appId:             "1:122775768295:web:750534f86822fe07bbe642"
}));

const EMOJIS = ["🌍","✈️","🏖️","🏔️","🌸","🗺️","🧳","🚂","⛵","🏛️","🌴","🎿","🏕️","🚗","🛳️"];
const ACT_TYPES = [
  {v:"transport",l:"Trasporto",e:"🚆",c:"#6366f1"},{v:"accommodation",l:"Alloggio",e:"🏨",c:"#0ea5e9"},
  {v:"food",l:"Cibo",e:"🍽️",c:"#f59e0b"},{v:"attraction",l:"Attrazione",e:"🏛️",c:"#ec4899"},
  {v:"activity",l:"Attività",e:"🎯",c:"#10b981"},{v:"shopping",l:"Shopping",e:"🛍️",c:"#8b5cf6"},
  {v:"other",l:"Altro",e:"📌",c:"#6b7280"},
];
const PLACE_CATS = [
  {v:"attraction",l:"Attrazione",e:"🏛️"},{v:"restaurant",l:"Ristorante",e:"🍽️"},
  {v:"hotel",l:"Alloggio",e:"🏨"},{v:"museum",l:"Museo",e:"🖼️"},
  {v:"nature",l:"Natura",e:"🌿"},{v:"shopping",l:"Shopping",e:"🛍️"},
  {v:"bar",l:"Bar",e:"🍹"},{v:"other",l:"Altro",e:"📌"},
];
const EXP_CATS = [
  {v:"transport",l:"Trasporto",e:"🚆",c:"#6366f1"},{v:"accommodation",l:"Alloggio",e:"🏨",c:"#0ea5e9"},
  {v:"food",l:"Cibo",e:"🍽️",c:"#f59e0b"},{v:"activities",l:"Attività",e:"🎯",c:"#10b981"},
  {v:"shopping",l:"Shopping",e:"🛍️",c:"#8b5cf6"},{v:"other",l:"Altro",e:"📌",c:"#6b7280"},
];

let currentTripId=null, currentTrip=null, tripListener=null;
let selEmoji="🌍", selActType="activity", selPlaceCat="attraction", selExpCat="food";
let currentDayId=null, placesFilter="all";
let leafletMap=null, leafletInited=false;

// ── Boot ──────────────────────────────────────────────────────────────────────
buildEmojiGrid();
buildPills("act-type-pills",  ACT_TYPES,  v=>selActType=v,  ()=>selActType);
buildPills("place-cat-pills", PLACE_CATS, v=>selPlaceCat=v, ()=>selPlaceCat);
buildPills("exp-cat-pills",   EXP_CATS,   v=>selExpCat=v,   ()=>selExpCat);
loadTrips();

// Auto-join da URL (?join=CODICE)
const urlCode = new URLSearchParams(location.search).get("join");
if (urlCode) setTimeout(()=>joinByCode(urlCode.toUpperCase()), 400);

// ── UI helpers ────────────────────────────────────────────────────────────────
function show(id){ document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active")); document.getElementById(id).classList.add("active"); }
window.closeModal = id => document.getElementById(id).style.display="none";
window.closeBg = (e,id) => { if(e.target.id===id) closeModal(id); };

window.openModal = (type, dayId) => {
  if(type==="activity"){
    currentDayId=dayId;
    ["a-title","a-address","a-notes"].forEach(id=>document.getElementById(id).value="");
    document.getElementById("a-time").value="09:00";
    document.getElementById("a-duration").value="60";
    document.getElementById("a-cost").value="0";
    buildPills("act-type-pills",ACT_TYPES,v=>selActType=v,()=>selActType);
  }
  if(type==="place"){
    ["p-name","p-address","p-notes"].forEach(id=>document.getElementById(id).value="");
    buildPills("place-cat-pills",PLACE_CATS,v=>selPlaceCat=v,()=>selPlaceCat);
  }
  if(type==="expense"){
    ["e-title","e-amount","e-notes"].forEach(id=>document.getElementById(id).value="");
    document.getElementById("e-date").value=today();
    buildPills("exp-cat-pills",EXP_CATS,v=>selExpCat=v,()=>selExpCat);
  }
  document.getElementById("modal-"+type).style.display="flex";
};

function buildEmojiGrid(){

    g.appendChild(b);
  });
}

function buildPills(cid,items,setter,getter){
  const c=document.getElementById(cid); c.innerHTML="";
  items.forEach(item=>{
    const b=document.createElement("button"); b.className="type-pill"; b.textContent=item.e+" "+item.l;
    const on=()=>{ setter(item.v); c.querySelectorAll(".type-pill").forEach(x=>{x.style.background="var(--surface2)";x.style.color="var(--text)";x.style.borderColor="var(--surface3)";}); b.style.background=item.c||"var(--accent)"; b.style.color="#fff"; b.style.borderColor=item.c||"var(--accent)"; };
    b.onclick=on; if(getter()===item.v) setTimeout(on,0); c.appendChild(b);
  });
}

const today=()=>new Date().toISOString().split("T")[0];
const nDays=(s,e)=>Math.round((new Date(e)-new Date(s))/86400000)+1;
function fmtDate(d){ const[,m,g]=d.split("-"); return`${parseInt(g)} ${["gen","feb","mar","apr","mag","giu","lug","ago","set","ott","nov","dic"][m-1]}`; }
function fmtLong(d){ return new Date(d+"T00:00:00").toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"}); }
function empty(icon,title,sub=""){ return`<div class="empty"><div class="ei">${icon}</div>${title?`<p style="font-family:var(--fd);font-size:18px;margin-bottom:6px">${title}</p>`:""}<p>${sub}</p></div>`; }

function loadTrips(){
  onValue(ref(db,"trips"),snap=>{
    const el=document.getElementById("trips-list"); el.innerHTML="";
    if(!snap.exists()){ el.innerHTML=empty("🗺️","Nessun viaggio ancora","Crea il tuo primo itinerario!"); return; }
    const trips=Object.values(snap.val()).sort((a,b)=>b.createdAt-a.createdAt);
    trips.forEach((trip,i)=>{

      const card=document.createElement("div"); card.className="card trip-card fa"; card.style.animationDelay=(i*.05)+"s";
      card.innerHTML=`
        <div style="display:flex;gap:14px;align-items:flex-start">
          <div style="font-size:32px;width:50px;height:50px;background:var(--surface2);border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0">${trip.coverEmoji}</div>
          <div style="flex:1;min-width:0">
            <div style="font-family:var(--fd);font-size:18px;font-weight:700">${trip.title}</div>
            <div style="color:var(--text2);font-size:13px;margin-top:2px">📍 ${trip.destination} · ${nDays(trip.startDate,trip.endDate)} giorni</div>
            <div style="color:var(--text3);font-size:12px;margin-top:2px">${fmtDate(trip.startDate)} – ${fmtDate(trip.endDate)}</div>
            ${trip.budget>0?`<div style="margin-top:9px"><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:3px"><span>Budget</span><span>${(trip.spent||0).toFixed(0)} / ${trip.budget} ${trip.currency}</span></div><div class="prog"><div class="prog-fill" style="width:${pct}%;background:${pct>80?"var(--accent)":"var(--teal)"}"></div></div></div>`:""}

document.getElementById("btn-create-trip").onclick=async()=>{
  const title=document.getElementById("t-title").value.trim();
  const start=document.getElementById("t-start").value;
  const end=document.getElementById("t-end").value;
  if(!title||!start||!end){alert("Compila titolo, data inizio e fine!");return;}
  if(start>end){alert("La data di ritorno deve essere dopo la partenza!");return;}
  const btn=document.getElementById("btn-create-trip"); btn.disabled=true; btn.textContent="Creazione...";
  try{
    const newRef=push(ref(db,"trips")); const id=newRef.key;
    const shareCode=Math.random().toString(36).substring(2,8).toUpperCase();
    const days={};
    let d=new Date(start+"T00:00:00"), ord=0;
    while(d<=new Date(end+"T00:00:00")){
      const ds=d.toISOString().split("T")[0], did="day_"+ds;
      days[did]={id:did,date:ds,label:`Giorno ${ord+1}`,activities:{},order:ord};
      d.setDate(d.getDate()+1); ord++;
    }
    await set(newRef,{id,title,destination:document.getElementById("t-dest").value.trim(),coverEmoji:selEmoji,startDate:start,endDate:end,currency:document.getElementById("t-currency").value,budget:parseFloat(document.getElementById("t-budget").value)||0,spent:0,days,places:{},expenses:{},createdAt:Date.now(),shareCode});
    await set(ref(db,`shareCodes/${shareCode}`),id);
    closeModal("modal-trip"); openTrip(id);
  }catch(e){alert("Errore: "+e.message);}
  finally{btn.disabled=false; btn.textContent="Crea viaggio 🚀";}
};

function openTrip(tripId){
  if(tripListener){off(ref(db,`trips/${currentTripId}`)); tripListener=null;}
  if(leafletMap){leafletMap.remove(); leafletMap=null; leafletInited=false;}
  currentTripId=tripId;
  tripListener=onValue(ref(db,`trips/${tripId}`),snap=>{
    if(!snap.exists())return; currentTrip=snap.val(); renderTrip();
  });
  show("trip"); switchTab("itinerary");
}

document.getElementById("btn-back").onclick=()=>{
  if(tripListener){off(ref(db,`trips/${currentTripId}`)); tripListener=null;}
  if(leafletMap){leafletMap.remove(); leafletMap=null; leafletInited=false;}
  show("home");
};

function renderTrip(){
  const t=currentTrip;
  document.getElementById("trip-emoji").textContent=t.coverEmoji;
  document.getElementById("trip-title").textContent=t.title;
  document.getElementById("trip-subtitle").textContent=`📍 ${t.destination} · ${nDays(t.startDate,t.endDate)}g · ${fmtDate(t.startDate)}–${fmtDate(t.endDate)}`;
  if(t.budget>0){
    const pct=Math.min(100,(t.spent||0)/t.budget*100);
    document.getElementById("budget-hdr").style.display="block";
    document.getElementById("bh-label").textContent=`Budget: ${t.currency} ${t.budget.toFixed(0)}`;
    document.getElementById("bh-pct").textContent=`Speso: ${t.currency} ${(t.spent||0).toFixed(0)} (${pct.toFixed(0)}%)`;
    document.getElementById("bh-pct").style.color=pct>80?"#f87171":"var(--teal)";
    document.getElementById("bh-fill").style.cssText=`width:${pct}%;background:${pct>80?"#f87171":"var(--teal)"}`;
  }else document.getElementById("budget-hdr").style.display="none";
  renderTab(document.querySelector(".tab-btn.active")?.dataset.tab||"itinerary");
}

document.querySelectorAll(".tab-btn").forEach(btn=>btn.onclick=()=>switchTab(btn.dataset.tab));
function switchTab(tab){
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
  document.querySelectorAll(".tab-content").forEach(c=>c.classList.toggle("active",c.id==="tab-"+tab));
  if(currentTrip) renderTab(tab);
}
function renderTab(tab){
  if(tab==="itinerary") renderItinerary();
  if(tab==="map")       renderMap();
  if(tab==="places")    renderPlaces();
  if(tab==="budget")    renderBudget();
}

  days.forEach((day,i)=>{

        ${dayTotal>0?`<span style="font-size:13px;font-weight:600;color:var(--text2)">${t.currency} ${dayTotal.toFixed(0)}</span>`:""}

      </div>

        :acts.map(a=>{const tp=ACT_TYPES.find(x=>x.v===a.type)||ACT_TYPES.at(-1); return`<div class="act-card"><div class="act-icon" style="background:${tp.c}20">${tp.e}</div><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap"><span style="font-weight:600;font-size:14px">${a.title}</span>${a.time?`<span style="font-size:11px;color:var(--text3)">⏰ ${a.time}</span>`:""}${a.duration?`<span style="font-size:11px;color:var(--text3)">${a.duration}min</span>`:""}</div>${a.address?`<div style="font-size:12px;color:var(--text2);margin-top:2px">📍 ${a.address}</div>`:""}${a.notes?`<div style="font-size:12px;color:var(--text3);margin-top:3px;font-style:italic">${a.notes}</div>`:""}</div>${a.cost>0?`<span style="font-size:13px;font-weight:700;color:var(--accent);flex-shrink:0">${t.currency} ${a.cost.toFixed(0)}</span>`:""}<button onclick="delAct('${day.id}','${a.id}',${a.cost||0})" style="width:26px;height:26px;border-radius:6px;border:1px solid var(--surface3);cursor:pointer;background:var(--surface2);color:var(--text3);flex-shrink:0;font-size:12px">✕</button></div>`;}).join("")

    el.appendChild(div);
  });
}

// ── MAPPA ─────────────────────────────────────────────────────────────────────
function renderMap(){
  const t=currentTrip, points=[];
  Object.values(t.days||{}).forEach(d=>Object.values(d.activities||{}).forEach(a=>{if(a.lat&&a.lng)points.push({lat:a.lat,lng:a.lng,title:a.title,type:a.type});}));
  Object.values(t.places||{}).forEach(p=>{if(p.lat&&p.lng)points.push({lat:p.lat,lng:p.lng,title:p.name,type:"place"});});
  document.getElementById("map-info").textContent=points.length?`🗺️ ${points.length} luoghi sulla mappa`:"🗺️ Nessun luogo mappato — aggiungi attività con coordinate";
  if(leafletInited){setTimeout(()=>leafletMap.invalidateSize(),100);return;}
  leafletInited=true;
  const L=window.L, center=points.length?[points[0].lat,points[0].lng]:[41.9028,12.4964];
  leafletMap=L.map("map",{center,zoom:points.length?13:5});
  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap",maxZoom:19}).addTo(leafletMap);
  const EC={transport:"#6366f1",accommodation:"#0ea5e9",food:"#f59e0b",attraction:"#ec4899",activity:"#10b981",shopping:"#8b5cf6",place:"#e8632a",other:"#6b7280"};
  const EE={transport:"🚆",accommodation:"🏨",food:"🍽️",attraction:"🏛️",activity:"🎯",shopping:"🛍️",place:"📍",other:"📌"};
  points.forEach(p=>{
    const icon=L.divIcon({html:`<div style="background:${EC[p.type]||"#888"};color:#fff;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,.3);border:2px solid #fff">${EE[p.type]||"📌"}</div>`,className:"",iconSize:[32,32],iconAnchor:[16,16]});
    L.marker([p.lat,p.lng],{icon}).bindPopup(`<strong>${p.title}</strong>`).addTo(leafletMap);
  });
  if(points.length>1)leafletMap.fitBounds(L.latLngBounds(points.map(p=>[p.lat,p.lng])),{padding:[40,40]});
  setTimeout(()=>leafletMap.invalidateSize(),200);
}

function renderBudget(){
  const t=currentTrip, expenses=Object.values(t.expenses||{}).sort((a,b)=>b.createdAt-a.createdAt);
  const pct=t.budget>0?Math.min(100,(t.spent||0)/t.budget*100):0;
  const rem=t.budget>0?t.budget-(t.spent||0):null;
  document.getElementById("budget-stats").innerHTML=[{l:"Budget",v:t.budget>0?`${t.currency} ${t.budget.toFixed(0)}`:"—",c:"var(--ink2)"},{l:"Speso",v:`${t.currency} ${(t.spent||0).toFixed(0)}`,c:pct>80?"var(--accent)":"var(--text)"},{l:"Rimanente",v:rem!==null?`${t.currency} ${rem.toFixed(0)}`:"—",c:rem!==null&&rem<0?"#f87171":"var(--teal)"}].map(s=>`<div class="card stat-card"><div class="stat-val" style="color:${s.c};font-size:17px">${s.v}</div><div class="stat-lbl">${s.l}</div></div>`).join("");
  const bbs=document.getElementById("budget-bar-section");
  if(t.budget>0){bbs.style.display="block";bbs.innerHTML=`<div class="card" style="padding:18px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px"><span style="color:var(--text2)">Utilizzo budget</span><span style="font-weight:700;color:${pct>80?"var(--accent)":"var(--text)"}">${pct.toFixed(1)}%</span></div><div class="prog"><div class="prog-fill" style="width:${pct}%;background:${pct>80?"var(--accent)":"var(--teal)"}"></div></div></div>`;}else bbs.style.display="none";
  const bycat=EXP_CATS.map(cat=>({...cat,total:expenses.filter(e=>e.category===cat.v).reduce((s,e)=>s+e.amount,0)})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);
  document.getElementById("budget-cats").innerHTML=bycat.length?`<div class="card" style="padding:18px"><div style="font-family:var(--fd);font-size:16px;margin-bottom:12px">Per categoria</div>${bycat.map(cat=>{const cp=(t.spent||0)>0?(cat.total/(t.spent||0))*100:0;return`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px"><span>${cat.e} ${cat.l}</span><span style="font-weight:600">${t.currency} ${cat.total.toFixed(0)} <span style="color:var(--text3);font-weight:400">(${cp.toFixed(0)}%)</span></span></div><div class="prog"><div class="prog-fill" style="width:${cp}%;background:${cat.c}"></div></div></div>`;}).join("")}</div>`:"";
  const el=document.getElementById("expenses-list");
  if(!expenses.length){el.innerHTML=empty("💳","Nessuna spesa ancora","");return;}
  el.innerHTML=expenses.map((exp,i)=>{const cat=EXP_CATS.find(c=>c.v===exp.category)||EXP_CATS.at(-1);return`<div class="card fa" style="display:flex;align-items:center;gap:11px;padding:12px 14px;margin-bottom:10px;animation-delay:${i*.03}s"><div style="width:34px;height:34px;border-radius:9px;background:${cat.c}20;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0">${cat.e}</div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:14px">${exp.title}</div><div style="font-size:12px;color:var(--text3);margin-top:2px">${exp.date}</div></div><div style="font-weight:700;font-size:15px;flex-shrink:0">${t.currency} ${exp.amount.toFixed(2)}</div><button onclick="delExp('${exp.id}',${exp.amount})" style="width:26px;height:26px;border-radius:6px;border:1px solid var(--surface3);cursor:pointer;background:var(--surface2);color:var(--text3);font-size:12px;flex-shrink:0">✕</button></div>`;}).join("");
}
document.getElementById("btn-save-exp").onclick=async()=>{
  const title=document.getElementById("e-title").value.trim(), amount=parseFloat(document.getElementById("e-amount").value)||0;
  if(!title||!amount)return;
  const btn=document.getElementById("btn-save-exp"); btn.disabled=true;
  const id="exp_"+Date.now();
  await set(ref(db,`trips/${currentTripId}/expenses/${id}`),{id,title,amount,currency:currentTrip.currency,category:selExpCat,date:document.getElementById("e-date").value,notes:document.getElementById("e-notes").value.trim(),createdAt:Date.now()});
  await update(ref(db,`trips/${currentTripId}`),{spent:(currentTrip.spent||0)+amount});
  closeModal("modal-expense"); btn.disabled=false;
};
window.delExp=async(id,amount)=>{
  await remove(ref(db,`trips/${currentTripId}/expenses/${id}`));
  await update(ref(db,`trips/${currentTripId}`),{spent:Math.max(0,(currentTrip.spent||0)-amount)});
};

// ── CONDIVIDI ─────────────────────────────────────────────────────────────────
document.getElementById("btn-share").onclick=()=>{
  document.getElementById("share-code-display").textContent=currentTrip?.shareCode||"—";
  document.getElementById("modal-share").style.display="flex";
};
window.copyCode=()=>navigator.clipboard.writeText(currentTrip?.shareCode||"").then(()=>closeModal("modal-share"));
</script>
</body>
